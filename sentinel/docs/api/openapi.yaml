      summary: Handle inbound GitHub webhook
      description: |
        Receives webhook events from GitHub. Authenticates using GitHub's
        HMAC-SHA256 signature verification (x-hub-signature-256 header).
        This endpoint does not use SENTINEL's standard HMAC auth.
      tags: [GitHub]
      parameters:
        - name: x-hub-signature-256
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 signature of the payload
        - name: x-github-event
          in: header
          required: true
          schema:
            type: string
          description: The GitHub event type (e.g. push, pull_request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Webhook accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "200":
          description: Event ignored (not actionable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Invalid signature
          content:
            application/json:
              schema:
