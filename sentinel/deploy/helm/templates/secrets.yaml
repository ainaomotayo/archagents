{{- if eq .Values.secrets.provider "kubernetes" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinel.fullname" . }}-secrets
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | default "postgresql://sentinel:CHANGE_ME@postgres:5432/sentinel" | quote }}
  redis-url: {{ .Values.secrets.redisUrl | default "redis://redis:6379" | quote }}
  sentinel-secret: {{ .Values.secrets.sentinelSecret | default "CHANGE_ME" | quote }}
  nextauth-secret: {{ .Values.secrets.nextauthSecret | default "CHANGE_ME" | quote }}
  github-app-id: {{ .Values.secrets.githubAppId | default "" | quote }}
  github-private-key: {{ .Values.secrets.githubPrivateKey | default "" | quote }}
  github-webhook-secret: {{ .Values.secrets.githubWebhookSecret | default "" | quote }}
  s3-archive-bucket: {{ .Values.secrets.s3ArchiveBucket | default "" | quote }}
  s3-archive-prefix: {{ .Values.secrets.s3ArchivePrefix | default "sentinel" | quote }}
  s3-retention-days: {{ .Values.secrets.s3RetentionDays | default "2555" | quote }}
  aws-region: {{ .Values.secrets.awsRegion | default "us-east-1" | quote }}
  kms-master-key-id: {{ .Values.secrets.kmsMasterKeyId | default "" | quote }}
  cloud-provider: {{ .Values.secrets.cloudProvider | default "" | quote }}
  archive-bucket: {{ .Values.secrets.archiveBucket | default "" | quote }}
  archive-prefix: {{ .Values.secrets.archivePrefix | default "sentinel" | quote }}
  archive-retention-days: {{ .Values.secrets.archiveRetentionDays | default "2555" | quote }}
  gcp-project-id: {{ .Values.secrets.gcpProjectId | default "" | quote }}
  gcs-archive-bucket: {{ .Values.secrets.gcsArchiveBucket | default "" | quote }}
  gcp-kms-location: {{ .Values.secrets.gcpKmsLocation | default "global" | quote }}
  gcp-kms-key-ring: {{ .Values.secrets.gcpKmsKeyRing | default "sentinel" | quote }}
  gcp-kms-key-id: {{ .Values.secrets.gcpKmsKeyId | default "sentinel-master" | quote }}
  azure-storage-account-url: {{ .Values.secrets.azureStorageAccountUrl | default "" | quote }}
  azure-archive-container: {{ .Values.secrets.azureArchiveContainer | default "" | quote }}
  azure-key-vault-url: {{ .Values.secrets.azureKeyVaultUrl | default "" | quote }}
  azure-key-name: {{ .Values.secrets.azureKeyName | default "sentinel-master" | quote }}
  gitlab-client-id: {{ .Values.sso.gitlabClientId | default "" | quote }}
  gitlab-client-secret: {{ .Values.sso.gitlabClientSecret | default "" | quote }}
  gitlab-url: {{ .Values.sso.gitlabUrl | default "https://gitlab.com" | quote }}
  oidc-client-id: {{ .Values.sso.oidcClientId | default "" | quote }}
  oidc-client-secret: {{ .Values.sso.oidcClientSecret | default "" | quote }}
  oidc-issuer: {{ .Values.sso.oidcIssuer | default "" | quote }}
  oidc-provider-name: {{ .Values.sso.oidcProviderName | default "SSO" | quote }}
  saml-jackson-url: {{ .Values.sso.samlJacksonUrl | default "" | quote }}
  saml-jackson-product: {{ .Values.sso.samlJacksonProduct | default "sentinel" | quote }}
  saml-client-id: {{ .Values.sso.samlClientId | default "dummy" | quote }}
  saml-client-secret: {{ .Values.sso.samlClientSecret | default "dummy" | quote }}
{{- end }}
