# tests/e2e/docker-compose.e2e.yml
# E2E test stack — non-standard ports to avoid dev conflicts
name: sentinel-e2e

x-api-env: &api-env
  DATABASE_URL: postgresql://sentinel:e2e-test-secret@postgres:5432/sentinel_e2e
  REDIS_URL: redis://redis:6379
  SENTINEL_SECRET: e2e-test-secret
  NODE_ENV: production
  EXPECTED_AGENTS: security,dependency
  AGENT_TIMEOUT_MS: "30000"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinel_e2e
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: e2e-test-secret
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_e2e"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      <<: *api-env
      PORT: "8080"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20

  assessor-worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: ["node", "dist/worker.js"]
    environment:
      <<: *api-env
      WORKER_HEALTH_PORT: "9092"
    ports:
      - "9092:9092"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9092/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20

  agent-security:
    build:
      context: ../..
      dockerfile: agents/security/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      HEALTH_PORT: "8081"
    ports:
      - "8082:8081"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20

  agent-dependency:
    build:
      context: ../..
      dockerfile: agents/dependency/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      HEALTH_PORT: "8083"
    ports:
      - "8084:8083"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20
