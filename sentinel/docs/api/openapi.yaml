openapi: "3.1.0"
info:
  title: SENTINEL API
  version: "1.0.0"
  description: |
    AI-Generated Code Governance & Compliance API.

    SENTINEL scans code diffs for security vulnerabilities, license compliance,
    quality issues, policy violations, dependency risks, and AI-generation markers.
    Passing scans receive a cryptographically signed compliance certificate.
  contact:
    name: SENTINEL Team
    email: sentinel@archagents.dev
  license:
    name: Proprietary
    identifier: LicenseRef-SENTINEL-1.0

servers:
  - url: https://api.sentinel.example.com
    description: Production
  - url: https://api-staging.sentinel.example.com
    description: Staging

paths:
  /v1/scans:
    get:
      operationId: listScans
      summary: List scans
      description: |
        List scans with filtering by status and project, with pagination support.
      tags: [Scans]
      security:
        - hmacAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, scanning, completed, failed]
          description: Filter by scan status
        - name: projectId
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of scans
          content:
            application/json:
              schema:
                type: object
                required: [scans, total, limit, offset]
                properties:
                  scans:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanRecord"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: submitScan
      summary: Submit a scan
      description: |
        Submit a code diff for compliance scanning. Returns a scan ID and
        poll URL to check status. The scan runs asynchronously through the
        agent pipeline (security, license, quality, policy, dependency, AI-detection).
      tags: [Scans]
      security:
        - hmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanSubmission"
      responses:
        "202":
          description: Scan accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid HMAC signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/scans/{id}:
    get:
      operationId: getScan
      summary: Get a scan
      description: |
        Retrieve a single scan by its ID, including associated certificate
        and finding count.
      tags: [Scans]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Scan ID
      responses:
        "200":
          description: Scan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanRecord"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/scans/{id}/poll:
    get:
      operationId: pollScan
      summary: Poll scan status
      description: |
        Poll the status of a previously submitted scan. Returns the current
        status and, when completed, the full assessment summary.
      tags: [Scans]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Scan ID returned from POST /v1/scans
      responses:
        "200":
          description: Current scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/findings:
    get:
      operationId: listFindings
      summary: List findings
      description: |
        List findings across scans with filtering and pagination.
      tags: [Findings]
      security:
        - hmacAuth: []
      parameters:
        - name: scanId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by scan ID
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
          description: Filter by severity
        - name: type
          in: query
          schema:
            type: string
            enum: [security, license, quality, policy, dependency, ai-detection]
          description: Filter by finding type
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of findings
          content:
            application/json:
              schema:
                type: object
                required: [findings, total, limit, offset]
                properties:
                  findings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Finding"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/findings/{id}:
    get:
      operationId: getFinding
      summary: Get a finding
      description: |
        Retrieve a single finding by its ID.
      tags: [Findings]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Finding ID
      responses:
        "200":
          description: Finding details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFinding
      summary: Update a finding
      description: |
        Update finding status or suppress a finding. Suppressed findings are
        excluded from future risk score calculations.
      tags: [Findings]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Finding ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                suppressed:
                  type: boolean
                suppressedBy:
                  type: string
      responses:
        "200":
          description: Updated finding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/certificates:
    get:
      operationId: listCertificates
      summary: List certificates
      description: |
        List compliance certificates with filtering and pagination.
      tags: [Certificates]
      security:
        - hmacAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: status
          in: query
          schema:
            type: string
            enum: [pass, provisional, fail]
          description: Filter by certificate verdict status
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of certificates
          content:
            application/json:
              schema:
                type: object
                required: [certificates, total, limit, offset]
                properties:
                  certificates:
                    type: array
                    items:
                      $ref: "#/components/schemas/Certificate"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/certificates/{id}:
    get:
      operationId: getCertificate
      summary: Get a certificate
      description: |
        Retrieve a single compliance certificate by its ID.
      tags: [Certificates]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Certificate ID
      responses:
        "200":
          description: Certificate details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Certificate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/certificates/{id}/verify:
    post:
      operationId: verifyCertificate
      summary: Verify certificate signature
      description: |
        Verify the cryptographic signature of a compliance certificate.
        Returns whether the certificate signature is valid.
      tags: [Certificates]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Certificate ID
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                required: [valid, certificateId]
                properties:
                  valid:
                    type: boolean
                    description: Whether the certificate signature is valid
                  certificateId:
                    type: string
                    format: uuid
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Certificate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/certificates/{id}/revoke:
    post:
      operationId: revokeCertificate
      summary: Revoke a certificate
      description: |
        Revoke a previously issued compliance certificate. This is an
        irreversible action that updates the certificate status and creates
        an audit log entry.
      tags: [Certificates]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Certificate ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Reason for revocation
      responses:
        "200":
          description: Certificate revoked
          content:
            application/json:
              schema:
                type: object
                required: [id, status, revokedAt]
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum: [revoked]
                  revokedAt:
                    type: string
                    format: date-time
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Certificate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects:
    get:
      operationId: listProjects
      summary: List projects
      description: |
        List all projects in the organization, including scan counts.
      tags: [Projects]
      security:
        - hmacAuth: []
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects/{id}:
    get:
      operationId: getProject
      summary: Get a project
      description: |
        Retrieve a single project by ID, including scan count and the
        10 most recent scans with their certificates.
      tags: [Projects]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        "200":
          description: Project details with recent scans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects/{id}/findings:
    get:
      operationId: listProjectFindings
      summary: List project findings
      description: |
        List findings for a specific project with filtering and pagination.
        Findings are linked to the project through their parent scan.
      tags: [Findings]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of project findings
          content:
            application/json:
              schema:
                type: object
                required: [findings, total, limit, offset]
                properties:
                  findings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Finding"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/policies:
    get:
      operationId: listPolicies
      summary: List policies
      description: List configured compliance policies for the organization.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of policies
          content:
            application/json:
              schema:
                type: object
                required: [policies, total, limit, offset]
                properties:
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Policy"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createPolicy
      summary: Create a policy
      description: Create a new compliance policy for the organization.
      tags: [Policies]
      security:
        - hmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyInput"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Invalid policy definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/policies/{id}:
    get:
      operationId: getPolicy
      summary: Get a policy
      description: Retrieve a single compliance policy by ID.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Policy details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updatePolicy
      summary: Update a policy
      description: Update an existing compliance policy.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyInput"
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePolicy
      summary: Delete a policy
      description: Delete an existing compliance policy.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Policy deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/policies/{id}/versions:
    get:
      operationId: listPolicyVersions
      summary: List policy versions
      description: Retrieve the version history of a policy.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Policy ID
      responses:
        "200":
          description: Policy version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyVersion"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/audit:
    get:
      operationId: queryAuditLog
      summary: Query audit log
      description: |
        Query the immutable, hash-chained audit log. Supports filtering by
        actor, action, resource type, and time range.
      tags: [Audit]
      security:
        - hmacAuth: []
      parameters:
        - name: action
          in: query
          schema:
            type: string
          description: Filter by action (e.g. scan.started, certificate.issued)
        - name: resourceType
          in: query
          schema:
            type: string
            enum: [scan, certificate, finding, policy, project]
          description: Filter by resource type
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Start of time range (inclusive)
        - name: until
          in: query
          schema:
            type: string
            format: date-time
          description: End of time range (inclusive)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated audit events
          content:
            application/json:
              schema:
                type: object
                required: [events, total, limit, offset]
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/dlq:
    get:
      operationId: getDlqMessages
      summary: DLQ monitoring
      description: |
        Retrieve dead-letter queue depth and messages for monitoring purposes.
        Requires authentication.
      tags: [Admin]
      security:
        - hmacAuth: []
      responses:
        "200":
          description: DLQ status and messages
          content:
            application/json:
              schema:
                type: object
                required: [depth, messages]
                properties:
                  depth:
                    type: integer
                    description: Number of messages in the dead-letter queue
                  messages:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: |
        Returns service health status. Does not require authentication.
        Used by load balancers and monitoring systems.
      tags: [System]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      description: |
        Returns Prometheus-formatted metrics. Does not require authentication.
        Used by monitoring systems for scraping application metrics.
      tags: [System]
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    ScanSubmission:
      type: object
      required: [projectId, commitHash, branch, author, timestamp, files, scanConfig]
      properties:
        projectId:
          type: string
          description: Unique project identifier
        commitHash:
          type: string
          description: Git commit SHA
        branch:
          type: string
          description: Git branch name
        author:
          type: string
          description: Commit author
        timestamp:
          type: string
          format: date-time
          description: Commit timestamp
        files:
          type: array
          items:
            type: object
            required: [path, language, hunks, aiScore]
            properties:
              path:
                type: string
              language:
                type: string
              hunks:
                type: array
                items:
                  type: object
                  required: [oldStart, oldCount, newStart, newCount, content]
                  properties:
                    oldStart:
                      type: integer
                    oldCount:
                      type: integer
                    newStart:
                      type: integer
                    newCount:
                      type: integer
                    content:
                      type: string
              aiScore:
                type: number
                minimum: 0
                maximum: 1
        toolHints:
          type: object
          properties:
            tool:
              type: string
            markers:
              type: array
              items:
                type: string
        scanConfig:
          type: object
          required: [securityLevel, licensePolicy, qualityThreshold]
          properties:
            securityLevel:
              type: string
              enum: [standard, strict, audit]
            licensePolicy:
              type: string
            qualityThreshold:
              type: number

    ScanResponse:
      type: object
      required: [scanId, status, pollUrl]
      properties:
        scanId:
          type: string
          format: uuid
          description: Unique scan identifier
        status:
          type: string
          description: Current scan status
        pollUrl:
          type: string
          description: URL to poll for scan completion

    PollResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, scanning, completed, failed]
          description: Current scan status
        assessment:
          type: object
          properties:
            status:
              type: string
              description: Assessment result status
            riskScore:
              type: number
              minimum: 0
              maximum: 100
            findingCount:
              type: integer
            certificateId:
              type: string
              format: uuid

    Finding:
      type: object
      required: [type, file, lineStart, lineEnd, severity, confidence]
      properties:
        type:
          type: string
          enum: [security, license, quality, policy, dependency, ai-detection]
        file:
          type: string
        lineStart:
          type: integer
        lineEnd:
          type: integer
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        confidence:
          type: string
          enum: [high, medium, low]
        title:
          type: string
        description:
          type: string
        remediation:
          type: string
        cweId:
          type: string

    Certificate:
      type: object
      required: [id, version, subject, verdict, scanMetadata, signature, issuedAt, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        version:
          type: string
          enum: ["1.0"]
        subject:
          type: object
          required: [projectId, repository, commitHash, branch, author, timestamp]
          properties:
            projectId:
              type: string
            repository:
              type: string
            commitHash:
              type: string
            branch:
              type: string
            author:
              type: string
            timestamp:
              type: string
              format: date-time
        verdict:
          type: object
          required: [status, riskScore, categories]
          properties:
            status:
              type: string
              enum: [pass, provisional, fail]
            riskScore:
              type: number
              minimum: 0
              maximum: 100
            categories:
              type: object
              additionalProperties:
                type: string
                enum: [pass, warn, fail]
        scanMetadata:
          type: object
          required: [agents, environmentHash, totalDurationMs, scanLevel]
          properties:
            agents:
              type: array
              items:
                type: object
                required: [name, version, rulesetVersion, rulesetHash, status, findingCount, durationMs]
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  rulesetVersion:
                    type: string
                  rulesetHash:
                    type: string
                  status:
                    type: string
                    enum: [completed, error, timeout]
                  findingCount:
                    type: integer
                  durationMs:
                    type: integer
            environmentHash:
              type: string
            totalDurationMs:
              type: integer
            scanLevel:
              type: string
              enum: [standard, strict, audit]
        compliance:
          type: object
          properties:
            euAiAct:
              type: object
              properties:
                riskCategory:
                  type: string
                documentationComplete:
                  type: boolean
                humanOversightVerified:
                  type: boolean
            soc2:
              type: object
              properties:
                controlsMapped:
                  type: array
                  items:
                    type: string
            iso27001:
              type: object
              properties:
                controlsMapped:
                  type: array
                  items:
                    type: string
        signature:
          type: string
          description: Cryptographic signature of the certificate
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    Assessment:
      type: object
      required: [id, commitHash, projectId, timestamp, status, riskScore, categories, findings]
      properties:
        id:
          type: string
          format: uuid
        commitHash:
          type: string
        projectId:
          type: string
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [full_pass, provisional_pass, fail, revoked, partial]
        riskScore:
          type: number
          minimum: 0
          maximum: 100
        categories:
          type: object
          properties:
            security:
              $ref: "#/components/schemas/CategoryScore"
            license:
              $ref: "#/components/schemas/CategoryScore"
            quality:
              $ref: "#/components/schemas/CategoryScore"
            policy:
              $ref: "#/components/schemas/CategoryScore"
            dependency:
              $ref: "#/components/schemas/CategoryScore"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"

    CategoryScore:
      type: object
      required: [score, status, findings]
      properties:
        score:
          type: number
          minimum: 0
          maximum: 100
        status:
          type: string
          enum: [pass, warn, fail, error]
        findings:
          type: object
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer

    Policy:
      type: object
      required: [id, name, type, enabled, rules, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [security, license, quality, dependency, ai-usage]
        enabled:
          type: boolean
        rules:
          type: array
          items:
            type: object
            required: [field, operator, value]
            properties:
              field:
                type: string
              operator:
                type: string
                enum: [eq, neq, gt, lt, gte, lte, contains, not_contains]
              value:
                type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PolicyInput:
      type: object
      required: [name, type, enabled, rules]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [security, license, quality, dependency, ai-usage]
        enabled:
          type: boolean
        rules:
          type: array
          items:
            type: object
            required: [field, operator, value]
            properties:
              field:
                type: string
              operator:
                type: string
                enum: [eq, neq, gt, lt, gte, lte, contains, not_contains]
              value:
                type: string

    AuditEvent:
      type: object
      required: [id, timestamp, actor, action, resource, detail, eventHash]
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        actor:
          type: object
          required: [type, id, name]
          properties:
            type:
              type: string
              enum: [system, user, agent, api]
            id:
              type: string
            name:
              type: string
            ip:
              type: string
        action:
          type: string
        resource:
          type: object
          required: [type, id]
          properties:
            type:
              type: string
              enum: [scan, certificate, finding, policy, project]
            id:
              type: string
        detail:
          type: object
          additionalProperties: true
        previousEventHash:
          type: string
        eventHash:
          type: string

    HealthResponse:
      type: object
      required: [status, version, uptime]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        uptime:
          type: number
          description: Uptime in seconds

    ScanRecord:
      type: object
      required: [id, projectId, commitHash, branch, author, status, startedAt]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
        commitHash:
          type: string
        branch:
          type: string
        author:
          type: string
        status:
          type: string
          enum: [pending, scanning, completed, failed]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        certificate:
          $ref: "#/components/schemas/Certificate"
        _count:
          type: object
          properties:
            findings:
              type: integer

    Project:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        repository:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            scans:
              type: integer

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            scans:
              type: array
              items:
                $ref: "#/components/schemas/ScanRecord"
              description: The 10 most recent scans for this project

    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code
        details:
          description: Additional error context

    PolicyVersion:
      type: object
      required: [id, policyId, version, rules, createdAt]
      properties:
        id:
          type: string
          format: uuid
        policyId:
          type: string
          format: uuid
        version:
          type: integer
        rules:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time

  securitySchemes:
    hmacAuth:
      type: apiKey
      in: header
      name: X-Sentinel-Signature
      description: |
        HMAC-SHA256 signature of the request body using the shared secret.
        Format: sha256=<hex-encoded-signature>
