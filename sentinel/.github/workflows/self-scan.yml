name: SENTINEL Self-Scan
on:
  schedule:
    - cron: "0 2 * * *" # Daily at 2 AM UTC
  workflow_dispatch: {}
jobs:
  self-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable Corepack and install dependencies
        run: corepack enable && pnpm install
      - name: Run SENTINEL on itself
        run: pnpm sentinel ci --policy .sentinel/policies.yaml
      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-scan-results
          path: .sentinel/results/
          retention-days: 30
