  parameters:
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

  securitySchemes:
    hmacAuth:
      type: apiKey
      in: header
      name: X-Sentinel-Signature
      description: |
        HMAC-SHA256 signature of the request body using the shared secret.
        Format: sha256=<hex-encoded-signature>
    scimBearerAuth:
      type: http
      scheme: bearer
      description: |
        SCIM bearer token generated via POST /v1/sso-configs/{id}/scim-token.
        Format: Authorization: Bearer scim_{token}
