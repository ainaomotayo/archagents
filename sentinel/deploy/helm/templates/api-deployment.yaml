apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: sentinel-api
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: sentinel-api
  template:
    metadata:
      labels:
        app: sentinel-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: sentinel-config
            - secretRef:
                name: sentinel-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
