openapi: "3.1.0"
info:
  title: SENTINEL API
  version: "1.0.0"
  description: |
    AI-Generated Code Governance & Compliance API.

    SENTINEL scans code diffs for security vulnerabilities, license compliance,
    quality issues, policy violations, dependency risks, and AI-generation markers.
    Passing scans receive a cryptographically signed compliance certificate.
  contact:
    name: SENTINEL Team
    email: sentinel@archagents.dev
  license:
    name: Proprietary
    identifier: LicenseRef-SENTINEL-1.0

servers:
  - url: https://api.sentinel.example.com
    description: Production
  - url: https://api-staging.sentinel.example.com
    description: Staging

tags:
  - name: Scans
    description: Submit code diffs for scanning and monitor scan progress
  - name: Findings
    description: View and manage security findings from scans
  - name: Certificates
    description: Compliance certificates issued for passing scans
  - name: Projects
    description: Project management and per-project findings
  - name: Policies
    description: Compliance policy configuration and versioning
  - name: Audit
    description: Immutable, hash-chained audit log queries
  - name: Compliance
    description: Compliance frameworks, assessments, and trend tracking
  - name: Evidence
    description: Chain of custody evidence records
  - name: Reports
    description: Compliance report generation
  - name: Webhooks
    description: Outbound webhook endpoint management and delivery history
  - name: Notifications
    description: Notification rule configuration for event-driven alerts
  - name: Events
    description: Real-time event streaming via Server-Sent Events
  - name: GitHub
    description: Inbound GitHub webhook handling
  - name: API Keys
    description: API key management for programmatic access
  - name: SSO
    description: Enterprise SSO identity provider configuration
  - name: Memberships
    description: Organization membership and role management
  - name: SCIM
    description: SCIM 2.0 user and group provisioning (RFC 7644)
  - name: Domains
    description: Domain ownership verification for SSO enforcement
  - name: Auth
    description: Login discovery and SAML service provider metadata
  - name: Admin
    description: Administrative operations including DLQ monitoring, key rotation, and crypto-shred
  - name: System
    description: Health checks and Prometheus metrics

paths:
  /v1/scans:
    get:
      operationId: listScans
      summary: List scans
      description: |
        List scans with filtering by status and project, with pagination support.
      tags: [Scans]
      security:
        - hmacAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, scanning, completed, failed]
          description: Filter by scan status
        - name: projectId
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of scans
          content:
            application/json:
              schema:
                type: object
                required: [scans, total, limit, offset]
                properties:
                  scans:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanRecord"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: submitScan
      summary: Submit a scan
      description: |
        Submit a code diff for compliance scanning. Returns a scan ID and
        poll URL to check status. The scan runs asynchronously through the
        agent pipeline (security, license, quality, policy, dependency, AI-detection).
      tags: [Scans]
      security:
        - hmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanSubmission"
      responses:
        "202":
          description: Scan accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid HMAC signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/scans/{id}:
    get:
      operationId: getScan
      summary: Get a scan
      description: |
        Retrieve a single scan by its ID, including associated certificate
        and finding count.
      tags: [Scans]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Scan ID
      responses:
        "200":
          description: Scan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanRecord"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/scans/{id}/poll:
    get:
      operationId: pollScan
      summary: Poll scan status
      description: |
        Poll the status of a previously submitted scan. Returns the current
        status and, when completed, the full assessment summary.
      tags: [Scans]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Scan ID returned from POST /v1/scans
      responses:
        "200":
          description: Current scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/findings:
    get:
      operationId: listFindings
      summary: List findings
      description: |
        List findings across scans with filtering and pagination.
      tags: [Findings]
      security:
        - hmacAuth: []
      parameters:
        - name: scanId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by scan ID
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
          description: Filter by severity
        - name: type
          in: query
          schema:
            type: string
            enum: [security, license, quality, policy, dependency, ai-detection]
          description: Filter by finding type
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of findings
          content:
            application/json:
              schema:
                type: object
                required: [findings, total, limit, offset]
                properties:
                  findings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Finding"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/findings/{id}:
    get:
      operationId: getFinding
      summary: Get a finding
      description: |
        Retrieve a single finding by its ID.
      tags: [Findings]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Finding ID
      responses:
        "200":
          description: Finding details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFinding
      summary: Update a finding
      description: |
        Update finding status or suppress a finding. Suppressed findings are
        excluded from future risk score calculations.
      tags: [Findings]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Finding ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                suppressed:
                  type: boolean
                suppressedBy:
                  type: string
      responses:
        "200":
          description: Updated finding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/certificates:
    get:
      operationId: listCertificates
      summary: List certificates
      description: |
        List compliance certificates with filtering and pagination.
      tags: [Certificates]
      security:
        - hmacAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: status
          in: query
          schema:
            type: string
            enum: [pass, provisional, fail]
          description: Filter by certificate verdict status
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of certificates
          content:
            application/json:
              schema:
                type: object
                required: [certificates, total, limit, offset]
                properties:
                  certificates:
                    type: array
                    items:
                      $ref: "#/components/schemas/Certificate"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/certificates/{id}:
    get:
      operationId: getCertificate
      summary: Get a certificate
      description: |
        Retrieve a single compliance certificate by its ID.
      tags: [Certificates]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Certificate ID
      responses:
        "200":
          description: Certificate details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Certificate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/certificates/{id}/verify:
    post:
      operationId: verifyCertificate
      summary: Verify certificate signature
      description: |
        Verify the cryptographic signature of a compliance certificate.
        Returns whether the certificate signature is valid.
      tags: [Certificates]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Certificate ID
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                required: [valid, certificateId]
                properties:
                  valid:
                    type: boolean
                    description: Whether the certificate signature is valid
                  certificateId:
                    type: string
                    format: uuid
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Certificate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/certificates/{id}/revoke:
    post:
      operationId: revokeCertificate
      summary: Revoke a certificate
      description: |
        Revoke a previously issued compliance certificate. This is an
        irreversible action that updates the certificate status and creates
        an audit log entry.
      tags: [Certificates]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Certificate ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Reason for revocation
      responses:
        "200":
          description: Certificate revoked
          content:
            application/json:
              schema:
                type: object
                required: [id, status, revokedAt]
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum: [revoked]
                  revokedAt:
                    type: string
                    format: date-time
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Certificate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects:
    get:
      operationId: listProjects
      summary: List projects
      description: |
        List all projects in the organization, including scan counts.
      tags: [Projects]
      security:
        - hmacAuth: []
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects/{id}:
    get:
      operationId: getProject
      summary: Get a project
      description: |
        Retrieve a single project by ID, including scan count and the
        10 most recent scans with their certificates.
      tags: [Projects]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        "200":
          description: Project details with recent scans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects/{id}/findings:
    get:
      operationId: listProjectFindings
      summary: List project findings
      description: |
        List findings for a specific project with filtering and pagination.
        Findings are linked to the project through their parent scan.
      tags: [Findings]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of project findings
          content:
            application/json:
              schema:
                type: object
                required: [findings, total, limit, offset]
                properties:
                  findings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Finding"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/policies:
    get:
      operationId: listPolicies
      summary: List policies
      description: List configured compliance policies for the organization.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of policies
          content:
            application/json:
              schema:
                type: object
                required: [policies, total, limit, offset]
                properties:
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Policy"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createPolicy
      summary: Create a policy
      description: Create a new compliance policy for the organization.
      tags: [Policies]
      security:
        - hmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyInput"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Invalid policy definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/policies/{id}:
    get:
      operationId: getPolicy
      summary: Get a policy
      description: Retrieve a single compliance policy by ID.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Policy details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updatePolicy
      summary: Update a policy
      description: Update an existing compliance policy.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyInput"
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePolicy
      summary: Delete a policy
      description: Delete an existing compliance policy.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Policy deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/policies/{id}/versions:
    get:
      operationId: listPolicyVersions
      summary: List policy versions
      description: Retrieve the version history of a policy.
      tags: [Policies]
      security:
        - hmacAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Policy ID
      responses:
        "200":
          description: Policy version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyVersion"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/audit:
    get:
      operationId: queryAuditLog
      summary: Query audit log
      description: |
        Query the immutable, hash-chained audit log. Supports filtering by
        actor, action, resource type, and time range.
      tags: [Audit]
      security:
        - hmacAuth: []
      parameters:
        - name: action
          in: query
          schema:
            type: string
          description: Filter by action (e.g. scan.started, certificate.issued)
        - name: resourceType
          in: query
          schema:
            type: string
            enum: [scan, certificate, finding, policy, project]
          description: Filter by resource type
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Start of time range (inclusive)
        - name: until
          in: query
          schema:
            type: string
            format: date-time
          description: End of time range (inclusive)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated audit events
          content:
            application/json:
              schema:
                type: object
                required: [events, total, limit, offset]
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/dlq:
    get:
      operationId: getDlqMessages
      summary: DLQ monitoring
      description: |
        Retrieve dead-letter queue depth and messages for monitoring purposes.
        Requires authentication.
      tags: [Admin]
      security:
        - hmacAuth: []
      responses:
        "200":
          description: DLQ status and messages
          content:
            application/json:
              schema:
                type: object
                required: [depth, messages]
                properties:
                  depth:
                    type: integer
                    description: Number of messages in the dead-letter queue
                  messages:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/compliance/frameworks:
    get:
      operationId: listComplianceFrameworks
      summary: List compliance frameworks
      description: List all available compliance frameworks (built-in and custom).
      tags: [Compliance]
      security:
        - hmacAuth: []
      responses:
        "200":
          description: List of compliance frameworks
          content:
            application/json:
              schema:
                type: object
                properties:
                  frameworks:
                    type: array
                    items:
                      $ref: "#/components/schemas/ComplianceFramework"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createComplianceFramework
      summary: Create a compliance framework
      description: Create a custom compliance framework.
      tags: [Compliance]
      security:
        - hmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceFrameworkInput"
      responses:
        "201":
          description: Framework created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceFramework"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
