services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sentinel:sentinel_dev@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379
      SENTINEL_SECRET: dev-secret-change-in-production
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-}
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-}
      ARCHIVE_PREFIX: ${ARCHIVE_PREFIX:-sentinel}
      ARCHIVE_RETENTION_DAYS: ${ARCHIVE_RETENTION_DAYS:-2555}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ARCHIVE_BUCKET: ${S3_ARCHIVE_BUCKET:-}
      KMS_MASTER_KEY_ID: ${KMS_MASTER_KEY_ID:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_ARCHIVE_BUCKET: ${GCS_ARCHIVE_BUCKET:-}
      GCP_KMS_LOCATION: ${GCP_KMS_LOCATION:-global}
      GCP_KMS_KEY_RING: ${GCP_KMS_KEY_RING:-sentinel}
      GCP_KMS_KEY_ID: ${GCP_KMS_KEY_ID:-sentinel-master}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_ARCHIVE_CONTAINER: ${AZURE_ARCHIVE_CONTAINER:-}
      AZURE_KEY_VAULT_URL: ${AZURE_KEY_VAULT_URL:-}
      AZURE_KEY_NAME: ${AZURE_KEY_NAME:-sentinel-master}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      SENTINEL_API_URL: http://api:8080
      SENTINEL_SECRET: dev-secret-change-in-production
      SENTINEL_ROLE_MAP: ${SENTINEL_ROLE_MAP:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-SSO}
      SAML_JACKSON_URL: ${SAML_JACKSON_URL:-}
      SAML_JACKSON_PRODUCT: ${SAML_JACKSON_PRODUCT:-sentinel}
      SAML_CLIENT_ID: ${SAML_CLIENT_ID:-dummy}
      SAML_CLIENT_SECRET: ${SAML_CLIENT_SECRET:-dummy}

  assessor-worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sentinel:sentinel_dev@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379
      SENTINEL_SECRET: dev-secret-change-in-production
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-}
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-}
      ARCHIVE_PREFIX: ${ARCHIVE_PREFIX:-sentinel}
      ARCHIVE_RETENTION_DAYS: ${ARCHIVE_RETENTION_DAYS:-2555}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ARCHIVE_BUCKET: ${S3_ARCHIVE_BUCKET:-}
      KMS_MASTER_KEY_ID: ${KMS_MASTER_KEY_ID:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_ARCHIVE_BUCKET: ${GCS_ARCHIVE_BUCKET:-}
      GCP_KMS_LOCATION: ${GCP_KMS_LOCATION:-global}
      GCP_KMS_KEY_RING: ${GCP_KMS_KEY_RING:-sentinel}
      GCP_KMS_KEY_ID: ${GCP_KMS_KEY_ID:-sentinel-master}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_ARCHIVE_CONTAINER: ${AZURE_ARCHIVE_CONTAINER:-}
      AZURE_KEY_VAULT_URL: ${AZURE_KEY_VAULT_URL:-}
      AZURE_KEY_NAME: ${AZURE_KEY_NAME:-sentinel-master}
      WORKER_HEALTH_PORT: "9092"
    command: ["node", "apps/api/dist/worker.js"]
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js", "9092"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      SELF_SCAN_ENABLED: ${SELF_SCAN_ENABLED:-true}
      SCHEDULER_PORT: "9091"
    command: ["node", "apps/api/dist/scheduler.js"]
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js", "9091"]
      interval: 30s
      timeout: 5s
      retries: 3

  github-bridge:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sentinel:sentinel_dev@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY:-}
      GITHUB_BRIDGE_PORT: "9092"
    command: ["node", "apps/api/dist/github-bridge.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9092/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Analysis Agents
  agent-security:
    build:
      context: .
      dockerfile: agents/security/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  agent-dependency:
    build:
      context: .
      dockerfile: agents/dependency/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # agent-ip-license:
  #   build:
  #     context: .
  #     dockerfile: agents/ip-license/Dockerfile
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     REDIS_URL: redis://redis:6379

  prometheus:
    image: prom/prometheus:v3.2
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  pgdata:
