apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel-ingress
  namespace: sentinel
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sentinel.example.com
      secretName: sentinel-tls
  rules:
    - host: sentinel.example.com
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: sentinel-api
                port:
                  number: 8080
          - path: /webhooks
            pathType: Prefix
            backend:
              service:
                name: sentinel-api
                port:
                  number: 8080
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: sentinel-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinel-dashboard
                port:
                  number: 3000
