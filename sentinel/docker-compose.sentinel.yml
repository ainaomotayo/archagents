# SENTINEL On-Prem Production Deployment
# Usage: docker compose -f docker-compose.sentinel.yml --env-file .env up -d
# With LLM agent: docker compose -f docker-compose.sentinel.yml --profile llm --env-file .env up -d

networks:
  sentinel-internal:
    driver: bridge
    internal: true
  sentinel-external:
    driver: bridge

volumes:
  pgdata:
  redisdata:

services:
  # ---------- Infrastructure ----------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - sentinel-internal
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - sentinel-internal
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------- Application ----------

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
      - sentinel-external
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTINEL_SECRET: ${SENTINEL_SECRET}
      NODE_ENV: production
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-}
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-}
      ARCHIVE_PREFIX: ${ARCHIVE_PREFIX:-sentinel}
      ARCHIVE_RETENTION_DAYS: ${ARCHIVE_RETENTION_DAYS:-2555}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ARCHIVE_BUCKET: ${S3_ARCHIVE_BUCKET:-}
      KMS_MASTER_KEY_ID: ${KMS_MASTER_KEY_ID:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_ARCHIVE_BUCKET: ${GCS_ARCHIVE_BUCKET:-}
      GCP_KMS_LOCATION: ${GCP_KMS_LOCATION:-global}
      GCP_KMS_KEY_RING: ${GCP_KMS_KEY_RING:-sentinel}
      GCP_KMS_KEY_ID: ${GCP_KMS_KEY_ID:-sentinel-master}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_ARCHIVE_CONTAINER: ${AZURE_ARCHIVE_CONTAINER:-}
      AZURE_KEY_VAULT_URL: ${AZURE_KEY_VAULT_URL:-}
      AZURE_KEY_NAME: ${AZURE_KEY_NAME:-sentinel-master}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sentinel-external
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      SENTINEL_API_URL: http://api:8080
      SENTINEL_SECRET: ${SENTINEL_SECRET}
      SENTINEL_ROLE_MAP: ${SENTINEL_ROLE_MAP:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-SSO}
      SAML_JACKSON_URL: ${SAML_JACKSON_URL:-}
      SAML_JACKSON_PRODUCT: ${SAML_JACKSON_PRODUCT:-sentinel}
      SAML_CLIENT_ID: ${SAML_CLIENT_ID:-dummy}
      SAML_CLIENT_SECRET: ${SAML_CLIENT_SECRET:-dummy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  assessor-worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTINEL_SECRET: ${SENTINEL_SECRET}
      NODE_ENV: production
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-}
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-}
      ARCHIVE_PREFIX: ${ARCHIVE_PREFIX:-sentinel}
      ARCHIVE_RETENTION_DAYS: ${ARCHIVE_RETENTION_DAYS:-2555}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ARCHIVE_BUCKET: ${S3_ARCHIVE_BUCKET:-}
      KMS_MASTER_KEY_ID: ${KMS_MASTER_KEY_ID:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_ARCHIVE_BUCKET: ${GCS_ARCHIVE_BUCKET:-}
      GCP_KMS_LOCATION: ${GCP_KMS_LOCATION:-global}
      GCP_KMS_KEY_RING: ${GCP_KMS_KEY_RING:-sentinel}
      GCP_KMS_KEY_ID: ${GCP_KMS_KEY_ID:-sentinel-master}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_ARCHIVE_CONTAINER: ${AZURE_ARCHIVE_CONTAINER:-}
      AZURE_KEY_VAULT_URL: ${AZURE_KEY_VAULT_URL:-}
      AZURE_KEY_NAME: ${AZURE_KEY_NAME:-sentinel-master}
      WORKER_HEALTH_PORT: "9092"
    command: ["node", "apps/api/dist/worker.js"]
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js", "9092"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  scheduler:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SELF_SCAN_ENABLED: ${SELF_SCAN_ENABLED:-true}
      SCHEDULER_LEASE_TTL: ${SCHEDULER_LEASE_TTL:-15000}
      SCAN_TIMEOUT_MS: ${SCAN_TIMEOUT_MS:-300000}
      SCHEDULER_PORT: "9091"
      NODE_ENV: production
    command: ["node", "apps/api/dist/scheduler.js"]
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js", "9091"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  report-worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTINEL_SECRET: ${SENTINEL_SECRET}
      NODE_ENV: production
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-}
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-}
      ARCHIVE_PREFIX: ${ARCHIVE_PREFIX:-sentinel}
      REPORT_WORKER_PORT: "9094"
    command: ["node", "apps/api/dist/report-worker.js"]
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js", "9094"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  approval-worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      SENTINEL_SECRET: ${SENTINEL_SECRET}
      APPROVAL_WORKER_PORT: "9095"
    command: ["node", "dist/approval-worker.js"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9095/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  saml-jackson:
    image: boxyhq/jackson:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      JACKSON_URL: http://saml-jackson:5225
      DB_ENGINE: sql
      DB_TYPE: postgres
      DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://dashboard:3000}
    ports:
      - "5225:5225"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5225/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  github-bridge:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTINEL_SECRET: ${SENTINEL_SECRET}
      NODE_ENV: production
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY:-}
      GITHUB_BRIDGE_PORT: "9093"
    command: ["node", "apps/api/dist/github-bridge.js"]
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js", "9093"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------- Analysis Agents ----------

  security-agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_NAME: security
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      REDIS_URL: ${REDIS_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sentinel_security; print(\"ok\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  license-agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_NAME: ip-license
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      REDIS_URL: ${REDIS_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sentinel_license; print(\"ok\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  dependency-agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_NAME: dependency
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      REDIS_URL: ${REDIS_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sentinel_dependency; print(\"ok\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ai-detector-agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_NAME: ai-detector
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      REDIS_URL: ${REDIS_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sentinel_aidetector; print(\"ok\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  quality-agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_NAME: quality
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      REDIS_URL: ${REDIS_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sentinel_quality; print(\"ok\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  policy-agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_NAME: policy
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      REDIS_URL: ${REDIS_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sentinel_policy; print(\"ok\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------- Optional: LLM-powered Agents (requires API key) ----------

  llm-review-agent:
    profiles:
      - llm
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_NAME: llm-review
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel-internal
    environment:
      REDIS_URL: ${REDIS_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_TOKEN_BUDGET: ${LLM_TOKEN_BUDGET:-50000}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sentinel_llm; print(\"ok\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
