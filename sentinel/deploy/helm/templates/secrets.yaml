apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | default "postgresql://sentinel:CHANGE_ME@postgres:5432/sentinel" | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | default "redis://redis:6379" | quote }}
  SENTINEL_SECRET: {{ .Values.secrets.sentinelSecret | default "CHANGE_ME" | quote }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | default "CHANGE_ME" | quote }}
  GITHUB_APP_ID: {{ .Values.secrets.githubAppId | default "" | quote }}
  GITHUB_PRIVATE_KEY: {{ .Values.secrets.githubPrivateKey | default "" | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.githubWebhookSecret | default "" | quote }}
  S3_ARCHIVE_BUCKET: {{ .Values.secrets.s3ArchiveBucket | default "" | quote }}
  S3_ARCHIVE_PREFIX: {{ .Values.secrets.s3ArchivePrefix | default "sentinel" | quote }}
  S3_RETENTION_DAYS: {{ .Values.secrets.s3RetentionDays | default "2555" | quote }}
  AWS_REGION: {{ .Values.secrets.awsRegion | default "us-east-1" | quote }}
  KMS_MASTER_KEY_ID: {{ .Values.secrets.kmsMasterKeyId | default "" | quote }}
  CLOUD_PROVIDER: {{ .Values.secrets.cloudProvider | default "" | quote }}
  ARCHIVE_BUCKET: {{ .Values.secrets.archiveBucket | default "" | quote }}
  ARCHIVE_PREFIX: {{ .Values.secrets.archivePrefix | default "sentinel" | quote }}
  ARCHIVE_RETENTION_DAYS: {{ .Values.secrets.archiveRetentionDays | default "2555" | quote }}
  GCP_PROJECT_ID: {{ .Values.secrets.gcpProjectId | default "" | quote }}
  GCS_ARCHIVE_BUCKET: {{ .Values.secrets.gcsArchiveBucket | default "" | quote }}
  GCP_KMS_LOCATION: {{ .Values.secrets.gcpKmsLocation | default "global" | quote }}
  GCP_KMS_KEY_RING: {{ .Values.secrets.gcpKmsKeyRing | default "sentinel" | quote }}
  GCP_KMS_KEY_ID: {{ .Values.secrets.gcpKmsKeyId | default "sentinel-master" | quote }}
  AZURE_STORAGE_ACCOUNT_URL: {{ .Values.secrets.azureStorageAccountUrl | default "" | quote }}
  AZURE_ARCHIVE_CONTAINER: {{ .Values.secrets.azureArchiveContainer | default "" | quote }}
  AZURE_KEY_VAULT_URL: {{ .Values.secrets.azureKeyVaultUrl | default "" | quote }}
  AZURE_KEY_NAME: {{ .Values.secrets.azureKeyName | default "sentinel-master" | quote }}
  GITLAB_CLIENT_ID: {{ .Values.sso.gitlabClientId | default "" | quote }}
  GITLAB_CLIENT_SECRET: {{ .Values.sso.gitlabClientSecret | default "" | quote }}
  GITLAB_URL: {{ .Values.sso.gitlabUrl | default "https://gitlab.com" | quote }}
  OIDC_CLIENT_ID: {{ .Values.sso.oidcClientId | default "" | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.sso.oidcClientSecret | default "" | quote }}
  OIDC_ISSUER: {{ .Values.sso.oidcIssuer | default "" | quote }}
  OIDC_PROVIDER_NAME: {{ .Values.sso.oidcProviderName | default "SSO" | quote }}
  SAML_JACKSON_URL: {{ .Values.sso.samlJacksonUrl | default "" | quote }}
  SAML_JACKSON_PRODUCT: {{ .Values.sso.samlJacksonProduct | default "sentinel" | quote }}
  SAML_CLIENT_ID: {{ .Values.sso.samlClientId | default "dummy" | quote }}
  SAML_CLIENT_SECRET: {{ .Values.sso.samlClientSecret | default "dummy" | quote }}
