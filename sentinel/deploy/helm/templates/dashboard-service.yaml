apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentinel.fullname" . }}-dashboard
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  selector:
    {{- include "sentinel.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 3000
      targetPort: http
  type: ClusterIP
