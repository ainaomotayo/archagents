name: JetBrains Plugin CI

on:
  push:
    paths:
      - 'sentinel/packages/sentinel-jetbrains/**'
      - 'sentinel/packages/sentinel-lsp/**'
  pull_request:
    paths:
      - 'sentinel/packages/sentinel-jetbrains/**'
      - 'sentinel/packages/sentinel-lsp/**'

jobs:
  build-lsp:
    name: Build & Test LSP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel/packages/sentinel-lsp
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: sentinel/pnpm-lock.yaml
      - run: cd ../../ && pnpm install --frozen-lockfile
      - run: npx tsc
      - run: npx vitest run

  build-lsp-binaries:
    name: Compile LSP Binaries
    needs: build-lsp
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: sentinel-lsp-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: sentinel-lsp-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: sentinel-lsp-win-x64.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: sentinel/packages/sentinel-lsp
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: sentinel/packages/sentinel-lsp/dist/${{ matrix.artifact }}

  build-jetbrains:
    name: Build & Test JetBrains Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel/packages/sentinel-jetbrains
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: ./gradlew buildPlugin
      - run: ./gradlew test
      - uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: sentinel/packages/sentinel-jetbrains/build/distributions/*.zip
