global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, component]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h
    - match:
        component: sso
      receiver: security
      group_wait: 10s

receivers:
  - name: default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#sentinel-alerts"
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
  - name: critical
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#sentinel-critical"
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
  - name: security
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#sentinel-security"
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

inhibit_rules:
  - source_match:
      alertname: CriticalAgentDown
    target_match:
      alertname: AgentSlowProcessing
    equal: [agent]
