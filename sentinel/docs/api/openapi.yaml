    post:
      operationId: rotateEncryptionKeys
      summary: Rotate encryption keys
      description: |
        Triggers rotation of all organisation encryption keys. Requires admin role.
      tags: [Admin]
      security:
        - hmacAuth: []
      responses:
        "200":
          description: Keys rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  keyCount:
                    type: integer

  /v1/admin/crypto-shred:
    post:
      operationId: cryptoShred
      summary: Crypto-shred organisation data
      description: |
        Permanently destroys all encryption keys for the organisation, rendering
        all encrypted data irrecoverable. Requires confirmation of the org ID.
      tags: [Admin]
      security:
        - hmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmOrgId]
              properties:
                confirmOrgId:
                  type: string
                  format: uuid
                  description: Must match the authenticated organisation ID
      responses:
        "200":
          description: Crypto-shred completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  orgId:
                    type: string
                  keysDestroyed:
                    type: integer
        "400":
          description: Org ID mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/discovery:
    get:
      operationId: discoverAuthProviders
      summary: Discover authentication providers for an email
      description: |
        Returns the available authentication providers for a given email address,
        based on domain verification and SSO configuration. Public endpoint.
      tags: [Auth]
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
            maxLength: 254
          description: User email address to look up providers for
      responses:
        "200":
          description: Auth providers for the email domain
          content:
            application/json:
              schema:
                type: object
                properties:
                  orgId:
                    type: string
                  orgName:
                    type: string
                  enforced:
                    type: boolean
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        enforced:
                          type: boolean
        "400":
          description: Invalid email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/saml/metadata:
    get:
      operationId: getSamlMetadata
      summary: Get SAML service provider metadata
      description: |
        Returns the SAML SP metadata XML document. Public endpoint used by
        identity providers during SAML configuration.
      tags: [Auth]
      responses:
        "200":
          description: SAML metadata XML
          content:
            application/xml:
              schema:
                type: string

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: |
        Returns service health status. Does not require authentication.
        Used by load balancers and monitoring systems.
      tags: [System]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      description: |
        Returns Prometheus-formatted metrics. Does not require authentication.
        Used by monitoring systems for scraping application metrics.
      tags: [System]
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    ScanSubmission:
      type: object
      required: [projectId, commitHash, branch, author, timestamp, files, scanConfig]
      properties:
        projectId:
          type: string
          description: Unique project identifier
        commitHash:
          type: string
          description: Git commit SHA
        branch:
          type: string
          description: Git branch name
        author:
          type: string
          description: Commit author
        timestamp:
          type: string
          format: date-time
          description: Commit timestamp
        files:
          type: array
          items:
            type: object
            required: [path, language, hunks, aiScore]
            properties:
              path:
                type: string
              language:
                type: string
              hunks:
                type: array
                items:
                  type: object
                  required: [oldStart, oldCount, newStart, newCount, content]
                  properties:
                    oldStart:
                      type: integer
                    oldCount:
                      type: integer
                    newStart:
                      type: integer
                    newCount:
                      type: integer
                    content:
                      type: string
              aiScore:
                type: number
                minimum: 0
                maximum: 1
        toolHints:
          type: object
          properties:
            tool:
              type: string
            markers:
              type: array
              items:
                type: string
        scanConfig:
          type: object
          required: [securityLevel, licensePolicy, qualityThreshold]
          properties:
            securityLevel:
              type: string
              enum: [standard, strict, audit]
            licensePolicy:
              type: string
            qualityThreshold:
              type: number

    ScanResponse:
      type: object
      required: [scanId, status, pollUrl]
      properties:
        scanId:
          type: string
          format: uuid
          description: Unique scan identifier
        status:
          type: string
          description: Current scan status
        pollUrl:
          type: string
          description: URL to poll for scan completion

    PollResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, scanning, completed, failed]
          description: Current scan status
        assessment:
          type: object
          properties:
            status:
              type: string
              description: Assessment result status
            riskScore:
              type: number
              minimum: 0
              maximum: 100
            findingCount:
              type: integer
            certificateId:
              type: string
              format: uuid

    Finding:
      type: object
      required: [type, file, lineStart, lineEnd, severity, confidence]
      properties:
        type:
          type: string
          enum: [security, license, quality, policy, dependency, ai-detection]
        file:
          type: string
        lineStart:
          type: integer
        lineEnd:
          type: integer
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        confidence:
          type: string
          enum: [high, medium, low]
        title:
          type: string
        description:
          type: string
        remediation:
          type: string
        cweId:
          type: string

    Certificate:
      type: object
      required: [id, version, subject, verdict, scanMetadata, signature, issuedAt, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        version:
          type: string
          enum: ["1.0"]
        subject:
          type: object
          required: [projectId, repository, commitHash, branch, author, timestamp]
          properties:
            projectId:
              type: string
            repository:
              type: string
            commitHash:
              type: string
            branch:
              type: string
            author:
              type: string
            timestamp:
              type: string
              format: date-time
        verdict:
          type: object
          required: [status, riskScore, categories]
          properties:
            status:
              type: string
              enum: [pass, provisional, fail]
            riskScore:
              type: number
              minimum: 0
              maximum: 100
            categories:
              type: object
              additionalProperties:
                type: string
                enum: [pass, warn, fail]
        scanMetadata:
          type: object
          required: [agents, environmentHash, totalDurationMs, scanLevel]
          properties:
            agents:
              type: array
              items:
                type: object
                required: [name, version, rulesetVersion, rulesetHash, status, findingCount, durationMs]
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  rulesetVersion:
                    type: string
                  rulesetHash:
                    type: string
                  status:
                    type: string
                    enum: [completed, error, timeout]
                  findingCount:
                    type: integer
                  durationMs:
                    type: integer
            environmentHash:
              type: string
            totalDurationMs:
              type: integer
            scanLevel:
              type: string
              enum: [standard, strict, audit]
        compliance:
          type: object
          properties:
            euAiAct:
              type: object
              properties:
                riskCategory:
                  type: string
                documentationComplete:
                  type: boolean
                humanOversightVerified:
                  type: boolean
            soc2:
              type: object
              properties:
                controlsMapped:
                  type: array
                  items:
                    type: string
            iso27001:
              type: object
              properties:
                controlsMapped:
                  type: array
                  items:
                    type: string
        signature:
          type: string
          description: Cryptographic signature of the certificate
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    Assessment:
      type: object
      required: [id, commitHash, projectId, timestamp, status, riskScore, categories, findings]
      properties:
        id:
          type: string
          format: uuid
        commitHash:
          type: string
        projectId:
          type: string
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [full_pass, provisional_pass, fail, revoked, partial]
        riskScore:
          type: number
          minimum: 0
          maximum: 100
        categories:
          type: object
          properties:
            security:
              $ref: "#/components/schemas/CategoryScore"
            license:
              $ref: "#/components/schemas/CategoryScore"
            quality:
              $ref: "#/components/schemas/CategoryScore"
            policy:
              $ref: "#/components/schemas/CategoryScore"
            dependency:
              $ref: "#/components/schemas/CategoryScore"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"

    CategoryScore:
      type: object
      required: [score, status, findings]
      properties:
        score:
          type: number
          minimum: 0
          maximum: 100
        status:
          type: string
          enum: [pass, warn, fail, error]
        findings:
          type: object
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer

    Policy:
      type: object
      required: [id, name, type, enabled, rules, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [security, license, quality, dependency, ai-usage]
        enabled:
          type: boolean
        rules:
          type: array
          items:
            type: object
            required: [field, operator, value]
            properties:
              field:
                type: string
              operator:
                type: string
                enum: [eq, neq, gt, lt, gte, lte, contains, not_contains]
              value:
                type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PolicyInput:
      type: object
      required: [name, type, enabled, rules]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [security, license, quality, dependency, ai-usage]
        enabled:
          type: boolean
        rules:
          type: array
          items:
            type: object
            required: [field, operator, value]
            properties:
              field:
                type: string
              operator:
                type: string
                enum: [eq, neq, gt, lt, gte, lte, contains, not_contains]
              value:
                type: string

    AuditEvent:
      type: object
      required: [id, timestamp, actor, action, resource, detail, eventHash]
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        actor:
          type: object
          required: [type, id, name]
          properties:
            type:
              type: string
              enum: [system, user, agent, api]
            id:
              type: string
