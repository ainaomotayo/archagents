{{- if ne .Values.secrets.provider "kubernetes" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "sentinel.fullname" . }}-secrets
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    {{- if eq .Values.secrets.provider "aws" }}
    name: aws-secrets-manager
    kind: ClusterSecretStore
    {{- else if eq .Values.secrets.provider "gcp" }}
    name: gcp-secret-manager
    kind: ClusterSecretStore
    {{- else if eq .Values.secrets.provider "azure" }}
    name: azure-key-vault
    kind: ClusterSecretStore
    {{- else if eq .Values.secrets.provider "vault" }}
    name: hashicorp-vault
    kind: ClusterSecretStore
    {{- end }}
  target:
    name: {{ include "sentinel.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ (index .Values.secrets .Values.secrets.provider).secretName }}
        property: DATABASE_URL
    - secretKey: redis-url
      remoteRef:
        key: {{ (index .Values.secrets .Values.secrets.provider).secretName }}
        property: REDIS_URL
    - secretKey: sentinel-secret
      remoteRef:
        key: {{ (index .Values.secrets .Values.secrets.provider).secretName }}
        property: SENTINEL_SECRET
    - secretKey: nextauth-secret
      remoteRef:
        key: {{ (index .Values.secrets .Values.secrets.provider).secretName }}
        property: NEXTAUTH_SECRET
    - secretKey: github-app-id
      remoteRef:
        key: {{ (index .Values.secrets .Values.secrets.provider).secretName }}
        property: GITHUB_APP_ID
    - secretKey: github-private-key
      remoteRef:
        key: {{ (index .Values.secrets .Values.secrets.provider).secretName }}
        property: GITHUB_PRIVATE_KEY
    - secretKey: github-webhook-secret
      remoteRef:
        key: {{ (index .Values.secrets .Values.secrets.provider).secretName }}
        property: GITHUB_WEBHOOK_SECRET
{{- end }}
