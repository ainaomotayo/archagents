apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinel.fullname" . }}-config
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | default "production" | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
  CORS_ORIGIN: {{ .Values.config.corsOrigin | default "*" | quote }}
  RATE_LIMIT_MAX: {{ .Values.config.rateLimitMax | default "100" | quote }}
