# =============================================================================
# SENTINEL Development Docker Compose
# =============================================================================
# Usage:
#   docker compose up                          # core services only
#   docker compose --profile all-agents up     # include batch agents
#   docker compose --profile sso up            # include SAML/SSO
#   docker compose --profile monitoring up     # include Prometheus + Grafana
#   docker compose --profile all-agents --profile sso --profile monitoring up
# =============================================================================

# ── YAML Anchors ─────────────────────────────────────────────────────────────

x-common-env: &common-env
  DATABASE_URL: postgresql://sentinel:sentinel_dev@postgres:5432/sentinel
  REDIS_URL: redis://redis:6379

x-api-image: &api-image
  image: ghcr.io/ainaomotayo/sentinel-api:latest

x-agent-base: &agent-base
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy

# ── Services ─────────────────────────────────────────────────────────────────

services:

  # ---------- Infrastructure ----------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Application ----------

  api:
    <<: *api-image
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      RUN_MIGRATIONS: "true"
      SENTINEL_SECRET: dev-secret-change-in-production
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-}
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-}
      ARCHIVE_PREFIX: ${ARCHIVE_PREFIX:-sentinel}
      ARCHIVE_RETENTION_DAYS: ${ARCHIVE_RETENTION_DAYS:-2555}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ARCHIVE_BUCKET: ${S3_ARCHIVE_BUCKET:-}
      KMS_MASTER_KEY_ID: ${KMS_MASTER_KEY_ID:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_ARCHIVE_BUCKET: ${GCS_ARCHIVE_BUCKET:-}
      GCP_KMS_LOCATION: ${GCP_KMS_LOCATION:-global}
      GCP_KMS_KEY_RING: ${GCP_KMS_KEY_RING:-sentinel}
      GCP_KMS_KEY_ID: ${GCP_KMS_KEY_ID:-sentinel-master}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_ARCHIVE_CONTAINER: ${AZURE_ARCHIVE_CONTAINER:-}
      AZURE_KEY_VAULT_URL: ${AZURE_KEY_VAULT_URL:-}
      AZURE_KEY_NAME: ${AZURE_KEY_NAME:-sentinel-master}
    healthcheck:
      test: ["CMD-SHELL", "HEALTH_PORT=8080 node healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 3

  dashboard:
    image: ghcr.io/ainaomotayo/sentinel-dashboard:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      SENTINEL_API_URL: http://api:8080
      SENTINEL_SECRET: dev-secret-change-in-production
      SENTINEL_ROLE_MAP: ${SENTINEL_ROLE_MAP:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-SSO}
      SAML_JACKSON_URL: ${SAML_JACKSON_URL:-}
      SAML_JACKSON_PRODUCT: ${SAML_JACKSON_PRODUCT:-sentinel}
      SAML_CLIENT_ID: ${SAML_CLIENT_ID:-dummy}
      SAML_CLIENT_SECRET: ${SAML_CLIENT_SECRET:-dummy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------- Workers ----------

  assessor-worker:
    <<: *api-image
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SENTINEL_SECRET: dev-secret-change-in-production
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-}
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-}
      ARCHIVE_PREFIX: ${ARCHIVE_PREFIX:-sentinel}
      ARCHIVE_RETENTION_DAYS: ${ARCHIVE_RETENTION_DAYS:-2555}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ARCHIVE_BUCKET: ${S3_ARCHIVE_BUCKET:-}
      KMS_MASTER_KEY_ID: ${KMS_MASTER_KEY_ID:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_ARCHIVE_BUCKET: ${GCS_ARCHIVE_BUCKET:-}
      GCP_KMS_LOCATION: ${GCP_KMS_LOCATION:-global}
      GCP_KMS_KEY_RING: ${GCP_KMS_KEY_RING:-sentinel}
      GCP_KMS_KEY_ID: ${GCP_KMS_KEY_ID:-sentinel-master}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_ARCHIVE_CONTAINER: ${AZURE_ARCHIVE_CONTAINER:-}
      AZURE_KEY_VAULT_URL: ${AZURE_KEY_VAULT_URL:-}
      AZURE_KEY_NAME: ${AZURE_KEY_NAME:-sentinel-master}
      WORKER_HEALTH_PORT: "9092"
    command: ["node", "apps/api/dist/worker.js"]
    healthcheck:
      test: ["CMD-SHELL", "HEALTH_PORT=9092 node healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    <<: *api-image
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      SELF_SCAN_ENABLED: ${SELF_SCAN_ENABLED:-true}
      SCHEDULER_LEASE_TTL: ${SCHEDULER_LEASE_TTL:-15000}
      SCAN_TIMEOUT_MS: ${SCAN_TIMEOUT_MS:-300000}
      SCHEDULER_PORT: "9091"
    command: ["node", "apps/api/dist/scheduler.js"]
    healthcheck:
      test: ["CMD-SHELL", "HEALTH_PORT=9091 node healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3

  report-worker:
    <<: *api-image
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SENTINEL_SECRET: dev-secret-change-in-production
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-}
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-}
      ARCHIVE_PREFIX: ${ARCHIVE_PREFIX:-sentinel}
      REPORT_WORKER_PORT: "9094"
    command: ["node", "apps/api/dist/report-worker.js"]
    healthcheck:
      test: ["CMD-SHELL", "HEALTH_PORT=9094 node healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3

  notification-worker:
    <<: *api-image
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      NOTIFICATION_WORKER_PORT: "9095"
    command: ["node", "apps/api/dist/notification-worker.js"]
    healthcheck:
      test: ["CMD-SHELL", "HEALTH_PORT=9095 node healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3

  github-bridge:
    <<: *api-image
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY:-}
      GITHUB_BRIDGE_PORT: "9092"
    command: ["node", "apps/api/dist/github-bridge.js"]
    healthcheck:
      test: ["CMD-SHELL", "HEALTH_PORT=9092 node healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------- Core Analysis Agents ----------

  agent-security:
    <<: *agent-base
    image: ghcr.io/ainaomotayo/sentinel-agent-security:latest
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  agent-dependency:
    <<: *agent-base
    image: ghcr.io/ainaomotayo/sentinel-agent-dependency:latest
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------- Batch Agents (profile: all-agents) ----------

  agent-ip-license:
    <<: *agent-base
    profiles:
      - all-agents
    build:
      context: .
      dockerfile: agents/ip-license/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  agent-quality:
    <<: *agent-base
    profiles:
      - all-agents
    build:
      context: .
      dockerfile: agents/quality/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  agent-ai-detector:
    <<: *agent-base
    profiles:
      - all-agents
    build:
      context: .
      dockerfile: agents/ai-detector/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8086/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  agent-policy:
    <<: *agent-base
    profiles:
      - all-agents
    build:
      context: .
      dockerfile: agents/policy/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  agent-llm-review:
    <<: *agent-base
    profiles:
      - all-agents
    build:
      context: .
      dockerfile: agents/llm-review/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8087/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  agent-formal-verification:
    <<: *agent-base
    profiles:
      - all-agents
    build:
      context: .
      dockerfile: agents/formal-verification/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8084/')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------- SSO (profile: sso) ----------

  saml-jackson:
    image: boxyhq/jackson:latest
    restart: unless-stopped
    profiles:
      - sso
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JACKSON_URL: http://saml-jackson:5225
      DB_ENGINE: sql
      DB_TYPE: postgres
      DB_URL: postgresql://sentinel:sentinel_dev@postgres:5432/sentinel
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "5225:5225"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5225/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------- Monitoring (profile: monitoring) ----------

  prometheus:
    image: prom/prometheus:v3.2
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/rules:/etc/prometheus/rules:ro
      - prometheusdata:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.5
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "3001:3001"
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: "3001"
    volumes:
      - ./deploy/monitoring/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafanadata:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
