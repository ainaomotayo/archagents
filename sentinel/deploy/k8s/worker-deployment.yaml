apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-worker
  namespace: sentinel
  labels:
    app: sentinel-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-worker
  template:
    metadata:
      labels:
        app: sentinel-worker
    spec:
      containers:
        - name: worker
          image: sentinel/api:latest
          command: ["node", "apps/api/dist/worker.js"]
          envFrom:
            - configMapRef:
                name: sentinel-config
            - secretRef:
                name: sentinel-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
