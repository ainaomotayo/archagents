apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-dashboard
  namespace: {{ .Values.global.namespace }}
  labels:
    app: sentinel-dashboard
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app: sentinel-dashboard
  template:
    metadata:
      labels:
        app: sentinel-dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: {{ .Values.dashboard.port }}
          envFrom:
            - configMapRef:
                name: sentinel-config
            - secretRef:
                name: sentinel-secrets
          env:
            - name: SENTINEL_API_URL
              value: "http://sentinel-api:{{ .Values.api.port }}"
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
